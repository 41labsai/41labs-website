[build]
  publish = "."

# Redirect old domain to new domain (301 permanent)
[[redirects]]
  from = "https://altivra.co/*"
  to = "https://41labs.ai/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.altivra.co/*"
  to = "https://41labs.ai/:splat"
  status = 301
  force = true

# AI Audit tool (proxied to Vercel serverless)
[[redirects]]
  from = "/audit"
  to = "https://teaser-deploy.vercel.app/audit.html"
  status = 200
  force = true

[[redirects]]
  from = "/api/audit"
  to = "https://teaser-deploy.vercel.app/api/audit"
  status = 200
  force = true

# Blog articles are static HTML files in /blog/ — no redirect needed

# Headers for SEO
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
